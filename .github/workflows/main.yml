name: Hello World Training Workflow
on:
  workflow_dispatch:
jobs:
  greet:
    env:
      MY_ENV: "Camilo Sesto"
    runs-on: ubuntu-latest
    steps:
      - name: Greet the User
        run: echo "Hello World!"
      - name: Run a muti-line script
        run: |
          echo "Hello $MY_ENV"
          echo "Hello $GITHUB_ACTOR"
